services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyber-cafe-manager
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-cyber-cafe-secret-key-change-in-production}
      DATABASE_PATH: /app/data/cafe.db
      STATIC_PATH: /app/public
      SEED_ON_START: ${SEED_ON_START:-true}
    volumes:
      - cafe-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  cafe-data:
    driver: local
